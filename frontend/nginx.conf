server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so the upstream is resolved at request time,
    # not at startup (avoids "host not found" when backend starts after nginx)
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8080;

    # Proxy /api/* → backend (strips the /api prefix)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
